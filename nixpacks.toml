[phases.setup]
nixPkgs = ["php83", "php83Extensions.pdo_mysql", "php83Extensions.pdo", "php83Extensions.mbstring", "php83Extensions.tokenizer", "php83Extensions.xml", "php83Extensions.ctype", "php83Extensions.curl", "php83Extensions.openssl", "curl", "nodejs", "nodePackages.npm"]

[phases.install]
cmds = [
  "curl -sS https://getcomposer.org/installer -o composer-setup.php && php composer-setup.php && php composer.phar install --ignore-platform-reqs && npm i"
]